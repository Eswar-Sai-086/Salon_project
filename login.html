<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | VN Beauty Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #faf7f2; --text-main: #2c2c2c; --gold-accent: #d4af37; --card-bg: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .login-card { background: var(--card-bg); padding: 50px 40px; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); text-align: center; width: 100%; max-width: 350px; border-top: 4px solid var(--gold-accent); }
        h1 { font-family: 'Playfair Display', serif; margin: 0 0 10px 0; color: var(--text-main); font-size: 2rem;}
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.85rem; color: #555; font-weight: 500; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; transition: 0.3s; }
        input:focus { outline: none; border-color: var(--gold-accent); }
        .btn-submit { width: 100%; background: var(--text-main); color: #fff; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-family: inherit; font-weight: 500; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: var(--gold-accent); }
        .flash { color: #dc3545; font-size: 0.85rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>VN Beauty Care</h1>
        <p>Staff & Admin Portal</p>
        {% with messages = get_flashed_messages() %}
          {% if messages %} <div class="flash">{{ messages[0] }}</div> {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group"><label>Username</label><input type="text" name="username" required></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
            <button type="submit" class="btn-submit">Secure Login</button>
        </form>
    </div>
</body>
</html>
